version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ratdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rat-internal
    expose:
      - "5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENV=production
    container_name: rat-backend
    restart: unless-stopped
    environment:
      ENV: production
      DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ratdb}?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      AGENT_ENROLLMENT_SECRET: ${AGENT_ENROLLMENT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${DOMAIN}}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rat-internal
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
        - VITE_WS_URL=/ws
    container_name: rat-frontend
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - rat-internal
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: rat-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/www:/var/www/html:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rat-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    container_name: rat-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/www:/var/www/html:rw
      - letsencrypt:/etc/letsencrypt:rw
    command: certonly --webroot --webroot-path=/var/www/html --email ${LETSENCRYPT_EMAIL:-admin@${DOMAIN}} --domains ${DOMAIN} --agree-tos --non-interactive
    networks:
      - rat-internal

volumes:
  postgres_data:
    driver: local
  letsencrypt:
    driver: local

networks:
  rat-internal:
    driver: bridge
    internal: false