version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rat-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ratdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rat-backend
    environment:
      DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ratdb}?sslmode=disable
      PORT: ${BACKEND_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rat-frontend
    environment:
      VITE_API_URL: /api/v1
      VITE_WS_URL: /ws
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - rat-network

volumes:
  postgres_data:

networks:
  rat-network:
    driver: bridge
